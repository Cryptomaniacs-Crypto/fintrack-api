# COPY this file to secrets.yml and modify as needed.
# config/secrets.yml is gitignored — never commit real secrets.
# In production, set these as Heroku config vars instead of using this file.

development:
  DATABASE_URL: sqlite://db/local/development.db
  SECURE_DB_KEY: <run `rake newkey:db` to generate>
  SECURE_HASH_KEY: <run `rake newkey:hash` to generate>
  SECURE_SCHEME: HTTP

test:
  DATABASE_URL: sqlite://db/local/test.db
  SECURE_DB_KEY: <run `rake newkey:db` to generate>
  SECURE_HASH_KEY: <run `rake newkey:hash` to generate>
  SECURE_SCHEME: HTTP

production:
  DATABASE_URL: <set via `heroku config:set` — Heroku Postgres addon populates automatically>
  SECURE_DB_KEY: <set via `heroku config:set SECURE_DB_KEY=...`>
  SECURE_HASH_KEY: <set via `heroku config:set SECURE_HASH_KEY=...`>
  SECURE_SCHEME: HTTPS
